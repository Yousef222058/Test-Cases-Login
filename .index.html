<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page - Task Submission</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f4; margin: 0; }
        .login-card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        h2 { margin-bottom: 20px; color: #333; }
        input { width: 100%; margin-bottom: 15px; padding: 12px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #0056b3; }
        .message { margin-top: 15px; font-size: 14px; min-height: 20px; font-weight: bold; }
        .error { color: #d9534f; }
        .success { color: #5cb85c; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Login Page</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password (8-12 characters)">
    <button onclick="validateLogin()">Login</button>
    <div id="msg" class="message"></div>
</div>

<script>
function validateLogin() {
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    const msg = document.getElementById('msg');
    
    // Reset message style
    msg.className = "message error";

    // TC_03: Empty fields check
    if (user === "" || pass === "") {
        msg.innerText = "Fields cannot be empty";
        return;
    }

    // TC_04: Basic SQL Injection Protection Simulation
    if (user.includes("' OR '1'='1")) {
        msg.innerText = "Login failed: SQL Injection detected";
        return;
    }

    // Task 2: Boundary Value Testing (8-12 chars)
    if (pass.length < 8) {
        msg.innerText = "Error: Password is below minimum boundary (7 characters)";
        return;
    }
    if (pass.length > 12) {
        msg.innerText = "Error: Password is above maximum boundary (13 characters)";
        return;
    }

    // TC_01: Valid login check (Sample Data)
    if (user === "student@ciu.edu.tr" && pass === "password123") {
        msg.className = "message success";
        msg.innerText = "User successfully logged in and redirected to dashboard";
    } else {
        // TC_02: Invalid login
        msg.innerText = "Invalid credentials";
    }
}
</script>

</body>
</html>
